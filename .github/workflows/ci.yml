name: Test Server Tunnel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: tunnel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-and-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      MIX_ENV: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex
            ~/.cache/rebar3
          key: >
            ${{ runner.os }}-otp26-elixir1.16-${{
              hashFiles(
                '**/mix.lock',
                '**/mix.exs',
                '**/config/*.exs',
                '**/config/**/*.exs'
              )
            }}
          restore-keys: |
            ${{ runner.os }}-otp26-elixir1.16-

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          mix local.hex --force
          mix local.rebar --force

          mix deps.get

      - name: Compile application
        shell: bash
        run: |
          set -euo pipefail
          # Removed 'mix clean' to preserve your compilation cache.
          mix compile --warnings-as-errors

      - name: Start server and ngrok
        shell: bash
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail

          export RUNNER_TRACKING_ID=""

          echo "Starting Elixir server..."
          mix run run.exs --no-halt >elixir_server.log 2>&1 &
          SERVER_PID=$!

          echo "Downloading ngrok..."
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz

          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok

          ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"

          echo "Starting ngrok..."
          timeout 3m ./ngrok http 4000 --url="moved-curiously-badger.ngrok-free.app" >ngrok_agent.log 2>&1 &
          NGROK_PID=$!

          echo "Waiting for server..."
          # Checked every 0.5 seconds instead of 2 seconds for instant detection
          for _ in {1..40}; do
            if curl -fs http://127.0.0.1:4000 >/dev/null 2>&1; then
              echo "✅ Server is ready."
              break
            fi

            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "❌ Server exited."
              cat elixir_server.log
              exit 1
            fi

            sleep 0.5
          done

          echo "Waiting for ngrok tunnel..."
          TUNNEL_URL=""
          for _ in {1..30}; do
            TUNNEL_URL=$(
              curl -fs http://127.0.0.1:4040/api/tunnels 2>/dev/null \
              | jq -r '.tunnels[0].public_url // empty'
            )

            if [ -n "$TUNNEL_URL" ]; then
              break
            fi

            if ! kill -0 "$NGROK_PID" 2>/dev/null; then
              echo "❌ Ngrok exited."
              cat ngrok_agent.log
              exit 1
            fi

            sleep 0.5
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to obtain tunnel URL."
            echo
            echo "=== ngrok log ==="
            cat ngrok_agent.log
            exit 1
          fi

          echo
          echo "======================================"
          echo "Tunnel URL:"
          echo "$TUNNEL_URL"
          echo "======================================"
          echo

          echo "=== Server Boot Logs ==="
          cat elixir_server.log
          echo "========================"
