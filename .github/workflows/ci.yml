name: Test Server Tunnel

on:
  workflow_dispatch: # Manual "Run workflow" button in GitHub

jobs:
  run-and-tunnel:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.16'
        otp-version: '26'

    - name: Install & Compile
      run: |
        mix deps.get
        mix compile

    # Start the Elixir app in the background so the runner doesn't get blocked
    - name: Start Elixir Web Server
      run: mix run --no-halt &

    # Download, configure, and start modern ngrok v3 manually
    - name: Start Ngrok Tunnel (v3)
      env:
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # 1. Download and extract the verified official ngrok v3 Linux agent
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar -xvzf ngrok-v3-stable-linux-amd64.tgz
        
        # 2. Add your authtoken to config using the v3 command
        ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"
        
        # 3. Spin up the tunnel in the background with a 30-minute timeout
        ( timeout 30m ./ngrok http 4000 ) &
        
        # 4. Give ngrok a few seconds to initialize
        sleep 5
        
        # 5. Extract and print the public URL to the workflow console
        TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        echo "============================================="
        echo "Your Tunnel URL is: $TUNNEL_URL"
        echo "============================================="
