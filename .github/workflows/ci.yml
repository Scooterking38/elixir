name: Elixir CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    # Define the Elixir and Erlang versions you want to use
    env:
      MIX_ENV: test
      ELIXIR_VERSION: '1.16.0' # Adjust to match your Elixir version
      OTP_VERSION: '26.2'      # Adjust to match your Erlang/OTP version

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Elixir and Erlang
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ env.ELIXIR_VERSION }}
        otp-version: ${{ env.OTP_VERSION }}

    # Caching dependencies and build artifacts makes subsequent runs lightning fast
    - name: Retrieve Cached Dependencies
      uses: actions/cache@v4
      id: mix-cache
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - name: Install dependencies
      if: steps.mix-cache.outputs.cache-hit != 'true'
      run: mix deps.get

    - name: Compile dependencies
      run: mix deps.compile

    - name: Check Code Formatting
      run: mix format --check-formatted

    - name: Compile Project (with warnings as errors)
      run: mix compile --warnings-as-errors

    - name: Run Tests
      run: mix test
