name: Test Server Tunnel

on:
  workflow_dispatch: # This adds the manual "Run workflow" button in GitHub

jobs:
  run-and-tunnel:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.16'
        otp-version: '26'

    - name: Install & Compile
      run: |
        mix deps.get
        mix compile

    # Start the Elixir app in the background so the runner doesn't get blocked
    - name: Start Elixir Web Server
      run: mix run --no-halt &

    # Spin up ngrok to forward port 4000
    - name: Start Ngrok Tunnel
      uses: luisboto/ngrok-tunnel-action@v0.1.7.2
      with:
        timeout: 30m # Automatically shuts down after 30 mins so you don't burn credits
        port: 4000
        tunnel_type: http
        ngrok_authtoken: ${{ secrets.NGROK_AUTHTOKEN }}
