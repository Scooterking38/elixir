name: Test Server Tunnel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: tunnel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-and-tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      MIX_ENV: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.16"

      #
      # Cache dependencies AND compiled dependencies.
      # The cache is invalidated whenever dependencies or build config changes.
      # Your own app is deleted from _build before compiling so it is never reused.
      #
      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex
            ~/.cache/rebar3
          key: >
            ${{ runner.os }}-otp26-elixir1.16-
            ${{ hashFiles(
              '**/mix.lock',
              '**/mix.exs',
              '**/config/*.exs',
              '**/config/**/*.exs'
            ) }}
          restore-keys: |
            ${{ runner.os }}-otp26-elixir1.16-

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          mix local.hex --force
          mix local.rebar --force

          mix deps.get

      #
      # Delete ONLY your application's compiled code.
      # This keeps compiled deps (cowlib, cowboy, ranch, plug, etc.)
      # while forcing your own project to rebuild.
      #
      - name: Compile application
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME=$(mix run -e 'IO.puts(Mix.Project.config()[:app])')

          rm -rf "_build/${MIX_ENV}/lib/${APP_NAME}"

          mix compile --warnings-as-errors

      - name: Start server & Ngrok
        shell: bash
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          set -euo pipefail

          export RUNNER_TRACKING_ID=""

          echo "Starting Elixir server..."
          mix run --no-halt > elixir_server.log 2>&1 &

          SERVER_PID=$!

          echo "Downloading ngrok..."
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz

          tar -xzf ngrok-v3-stable-linux-amd64.tgz

          chmod +x ngrok

          ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"

          echo "Starting tunnel..."

          timeout 3m ./ngrok http 4000 \
            > ngrok_agent.log 2>&1 &

          NGROK_PID=$!

          #
          # Wait for server
          #
          for i in {1..15}; do
            if curl -fs http://127.0.0.1:4000 >/dev/null 2>&1; then
              echo "✅ Server is accepting connections."
              break
            fi

            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "❌ Server exited."
              cat elixir_server.log
              exit 1
            fi

            sleep 2
          done

          #
          # Wait for ngrok API
          #
          TUNNEL_URL=""

          echo "Waiting for tunnel..."

          for i in {1..15}; do
            TUNNEL_URL=$(
              curl -fs http://127.0.0.1:4040/api/tunnels 2>/dev/null \
              | jq -r '.tunnels[]?.public_url' \
              | head -n1
            )

            if [ -n "$TUNNEL_URL" ]; then
              break
            fi

            if ! kill -0 "$NGROK_PID" 2>/dev/null; then
              echo "❌ Ngrok exited."
              cat ngrok_agent.log
              exit 1
            fi

            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Failed to obtain tunnel URL."
            cat ngrok_agent.log
            exit 1
          fi

          echo ""
          echo "=========================================="
          echo "Tunnel URL:"
          echo "$TUNNEL_URL"
          echo "=========================================="
          echo ""

          echo "Server PID : $SERVER_PID"
          echo "Ngrok PID  : $NGROK_PID"
          echo ""
          echo "Keeping tunnel alive for 3 minutes..."
          echo ""

          timeout 3m tail -F elixir_server.log || true

          echo ""
          echo "3-minute session complete."
