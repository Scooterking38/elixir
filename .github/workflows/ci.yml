
name: Test Server Tunnel

on:
  workflow_dispatch: # Manual "Run workflow" button in GitHub

jobs:
  run-and-tunnel:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.16'
        otp-version: '26'

    - name: Install & Compile
      run: |
        mix deps.get
        mix compile



# Start BOTH the Elixir server and Ngrok and keep them alive
    - name: Start Server and Ngrok Tunnel
      env:
        NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      run: |
        # 1. Start Elixir and detach it from GitHub's process tracker
        echo "Starting Elixir server..."
        export RUNNER_TRACKING_ID=""
        mix run --no-halt > elixir_server.log 2>&1 &
        
        # 2. Download and extract ngrok v3
        echo "Downloading Ngrok..."
        wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar -xvzf ngrok-v3-stable-linux-amd64.tgz
        
        # 3. Add authtoken
        ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"
        
        # 4. Start ngrok in the background (also detached from tracker)
        echo "Starting Ngrok tunnel..."
        ( timeout 30m ./ngrok http 4000 ) > ngrok_agent.log 2>&1 &
        
        # 5. Wait to let both processes spin up
        sleep 8
        
        # 6. RUN DIAGNOSTICS
        echo "=== RUNNING SYSTEM DIAGNOSTICS ==="
        
        # Check if Elixir process is still alive
        if ps aux | grep -v grep | grep -q "mix"; then
          echo "✅ Elixir is running successfully."
        else
          echo "❌ ERROR: Elixir process died immediately. Here are the logs:"
          cat elixir_server.log
          exit 1
        fi
        
        # Check if Ngrok process is still alive
        if ps aux | grep -v grep | grep -q "ngrok"; then
          echo "✅ Ngrok agent is running successfully."
        else
          echo "❌ ERROR: Ngrok died immediately. Here are the logs:"
          cat ngrok_agent.log
          exit 1
        fi
        
        # 7. Print the Tunnel URL
        TUNNEL_URL=$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')
        echo "============================================="
        echo "Your Tunnel URL is: $TUNNEL_URL"
        echo "============================================="
